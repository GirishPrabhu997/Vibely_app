<div style="text-align:center; padding:15px; border-bottom:1px solid #dbdbdb; font-family:sans-serif;">
    <a href="{% url 'index' %}" style="text-decoration:none; color:#0095f6; font-weight:bold;">🏠 Back to Feed</a>
</div>

<div style="max-width: 600px; margin: 20px auto; font-family: sans-serif;">
    <form method="GET" action="{% url 'explore' %}" style="text-align:center;">
        <input type="text" name="search" placeholder="Search usernames..." value="{{ search_query }}" style="padding:8px; width:70%;" required>
        <button type="submit" style="padding:8px;">Search</button>
    </form>

    {% if users %}
        <h4>Users Found:</h4>
        <ul style="list-style:none; padding:0;">
            {% for u in users %}
                <li style="padding:10px; background:white; border:1px solid #ddd; margin-bottom:5px;">
                    <a href="{% url 'profile' u.username %}" style="text-decoration:none; color:#0095f6; font-weight:bold;">@{{ u.username }}</a>
                </li>
            {% endfor %}
        </ul>
    {% endif %}

    <h3 style="margin-top:30px;">Discover Feed</h3>
    <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;">
       {% for post in all_posts %}
    {% if post.image %}
        {% if post.image.name|slice:"-4:" == ".mp4" %}
            <video width="200" controls><source src="{{ post.image.url }}"></video>
        {% else %}
            <img src="{{ post.image.url }}" style="max-width:200px;">
        {% endif %}
    {% endif %}
{% endfor %}
    </div>
</div>
