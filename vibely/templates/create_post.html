<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

    <title>Create Post • Vibely</title>

    <style>

        :root {
            --bg-color: #000;
            --card-bg: #121212;
            --border-color: #262626;
            --text-color: #ffffff;
            --text-muted: #a8a8a8;

            --btn-primary: #0095f6;
            --btn-hover: #1877f2;

            --input-bg: #1c1c1e;
            --danger: #ed4956;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;

            background: var(--bg-color);
            color: var(--text-color);

            min-height: 100vh;

            display: flex;
            flex-direction: column;
        }

        /* TOP NAV */

        .top-nav {
            display: flex;
            align-items: center;
            justify-content: space-between;

            padding: 15px 20px;

            border-bottom: 1px solid var(--border-color);

            position: sticky;
            top: 0;

            background: rgba(0,0,0,0.9);

            backdrop-filter: blur(10px);

            z-index: 100;
        }

        .back-btn {
            color: white;
            text-decoration: none;
            font-size: 24px;
        }

        .nav-title {
            font-size: 1rem;
            font-weight: 700;
        }

        /* MAIN */

        .main-wrapper {
            flex: 1;

            display: flex;
            justify-content: center;
            align-items: center;

            padding: 30px 20px;
        }

        .upload-card {
            width: 100%;
            max-width: 500px;

            background: var(--card-bg);

            border: 1px solid var(--border-color);

            border-radius: 18px;

            padding: 24px;

            box-shadow: 0 12px 40px rgba(0,0,0,0.5);
        }

        .form-group {
            margin-bottom: 22px;
        }

        .form-label {
            display: block;

            margin-bottom: 10px;

            font-size: 13px;
            font-weight: 700;

            color: var(--text-muted);

            text-transform: uppercase;

            letter-spacing: 0.5px;
        }

        /* DROPZONE */

        .file-dropzone {
            position: relative;

            border: 2px dashed var(--border-color);

            border-radius: 14px;

            padding: 45px 20px;

            text-align: center;

            cursor: pointer;

            transition: 0.25s ease;

            background: rgba(255,255,255,0.02);
        }

        .file-dropzone:hover {
            border-color: var(--btn-primary);

            background: rgba(0,149,246,0.05);
        }

        .file-dropzone.dragover {
            border-color: var(--btn-primary);

            background: rgba(0,149,246,0.08);
        }

        .dropzone-icon {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        .dropzone-text {
            font-size: 1rem;
            font-weight: 600;
        }

        .dropzone-subtext {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-top: 6px;
        }

        input[type="file"] {
            display: none;
        }

        /* PREVIEW */

        .preview-container {
            margin-top: 14px;

            border-radius: 14px;

            overflow: hidden;

            border: 1px solid var(--border-color);

            display: none;

            background: #000;
        }

        .preview-image,
        .preview-video {
            width: 100%;
            max-height: 350px;

            object-fit: cover;

            display: none;
        }

        /* TEXTAREA */

        .caption-textarea {
            width: 100%;

            height: 120px;

            background: var(--input-bg);

            border: 1px solid var(--border-color);

            border-radius: 12px;

            padding: 14px;

            color: white;

            resize: none;

            font-size: 15px;

            outline: none;

            transition: 0.2s ease;
        }

        .caption-textarea:focus {
            border-color: #555;
        }

        /* SELECT */

        .custom-select {
            width: 100%;

            padding: 13px;

            border-radius: 12px;

            border: 1px solid var(--border-color);

            background: var(--input-bg);

            color: white;

            outline: none;

            font-size: 14px;
        }

        /* BUTTON */

        .submit-btn {
            width: 100%;

            padding: 14px;

            border: none;

            border-radius: 12px;

            background: var(--btn-primary);

            color: white;

            font-size: 15px;
            font-weight: 700;

            cursor: pointer;

            transition: 0.2s ease;
        }

        .submit-btn:hover {
            background: var(--btn-hover);
        }

        .submit-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .cancel-link {
            display: block;

            margin-top: 14px;

            text-align: center;

            text-decoration: none;

            color: var(--text-muted);

            font-weight: 600;
        }

        .cancel-link:hover {
            color: var(--danger);
        }

        @media (max-width: 600px) {

            .upload-card {
                padding: 18px;
            }

            .file-dropzone {
                padding: 35px 16px;
            }

        }

    </style>
</head>

<body>

    <!-- TOP NAV -->

    <div class="top-nav">

        <a href="{% url 'index' %}" class="back-btn">
            ←
        </a>

        <div class="nav-title">
            Create New Post
        </div>

        <div style="width:24px;"></div>

    </div>

    <!-- MAIN -->

    <div class="main-wrapper">

        <div class="upload-card">

            <form
                action="{% url 'create_post' %}"
                method="POST"
                enctype="multipart/form-data"
                id="postForm"
            >

                {% csrf_token %}

                <!-- MEDIA -->

                <div class="form-group">

                    <label class="form-label">
                        Select Media
                    </label>

                    <input
                        type="file"
                        name="image"
                        id="imageFileInput"
                        accept="image/*,video/*"
                    >

                    <div class="file-dropzone" id="dropzoneBox">

                        <div class="dropzone-icon">
                            🎬
                        </div>

                        <div class="dropzone-text" id="uploadPromptText">
                            Choose image or video
                        </div>

                        <div class="dropzone-subtext" id="uploadSubtext">
                            Drag & drop or click to upload
                        </div>

                    </div>

                    <!-- PREVIEW -->

                    <div
                        class="preview-container"
                        id="previewContainer"
                    >

                        <img
                            id="previewImage"
                            class="preview-image"
                        >

                        <video
                            id="previewVideo"
                            class="preview-video"
                            controls
                            muted
                            playsinline
                        ></video>

                    </div>

                </div>

                <!-- CAPTION -->

                <div class="form-group">

                    <label class="form-label">
                        Caption
                    </label>

                    <textarea
                        name="caption"
                        class="caption-textarea"
                        placeholder="Write a caption..."
                    ></textarea>

                </div>

                <!-- TIME CAPSULE -->

                <div class="form-group">

                    <label class="form-label">
                        Time Capsule
                    </label>

                    <select
                        name="capsule_mode"
                        class="custom-select"
                    >

                        <option value="permanent">
                            Permanent Post
                        </option>

                        <option value="5">
                            Delete after 5 Minutes
                        </option>

                        <option value="60">
                            Delete after 1 Hour
                        </option>

                        <option value="1440">
                            Delete after 24 Hours
                        </option>

                    </select>

                </div>

                <!-- SUBMIT -->

                <button
                    type="submit"
                    class="submit-btn"
                    id="submitBtn"
                >
                    Share to Feed
                </button>

                <a
                    href="{% url 'index' %}"
                    class="cancel-link"
                >
                    Cancel
                </a>

            </form>

        </div>

    </div>

<script>

    const fileInput = document.getElementById("imageFileInput");

    const dropzone = document.getElementById("dropzoneBox");

    const previewContainer = document.getElementById("previewContainer");

    const previewImage = document.getElementById("previewImage");

    const previewVideo = document.getElementById("previewVideo");

    const uploadPrompt = document.getElementById("uploadPromptText");

    const uploadSubtext = document.getElementById("uploadSubtext");

    const form = document.getElementById("postForm");

    const submitBtn = document.getElementById("submitBtn");

    // CLICK TO OPEN

    dropzone.addEventListener("click", () => {
        fileInput.click();
    });

    // FILE CHANGE

    fileInput.addEventListener("change", () => {

        const file = fileInput.files[0];

        if (file) {
            showPreview(file);
        }

    });

    // DRAG EVENTS

    ["dragenter", "dragover"].forEach(eventName => {

        dropzone.addEventListener(eventName, (e) => {

            e.preventDefault();

            dropzone.classList.add("dragover");

        });

    });

    ["dragleave", "drop"].forEach(eventName => {

        dropzone.addEventListener(eventName, () => {

            dropzone.classList.remove("dragover");

        });

    });

    // DROP

    dropzone.addEventListener("drop", (e) => {

        e.preventDefault();

        const file = e.dataTransfer.files[0];

        if (file) {

            fileInput.files = e.dataTransfer.files;

            showPreview(file);

        }

    });

    // SHOW PREVIEW

    function showPreview(file) {

        const reader = new FileReader();

        reader.onload = function(e) {

            previewContainer.style.display = "block";

            uploadPrompt.innerText = "Change Selected Media";

            uploadSubtext.innerText = file.name;

            if (file.type.startsWith("video/")) {

                previewImage.style.display = "none";

                previewVideo.style.display = "block";

                previewVideo.src = e.target.result;

            } else {

                previewVideo.style.display = "none";

                previewImage.style.display = "block";

                previewImage.src = e.target.result;

            }

        };

        reader.readAsDataURL(file);

    }

    // PREVENT DOUBLE SUBMIT

    form.addEventListener("submit", () => {

        submitBtn.disabled = true;

        submitBtn.innerText = "Uploading...";

    });

</script>

</body>
</html>
